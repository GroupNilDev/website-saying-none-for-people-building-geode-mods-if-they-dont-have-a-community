<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>None — Centered</title>
  <style>
    /* Reset margins and padding to zero for full coverage */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Body takes full viewport, black background, and centers content */
    body {
      background-color: #000000;  /* pure black background */
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;        /* vertical centering */
      justify-content: center;    /* horizontal centering */
      font-family: system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    }

    /* Text styling: exactly 48px, white for contrast against black, perfectly centered */
    .big-text {
      font-size: 48px;            /* exact requirement: 48 size */
      font-weight: normal;        /* regular weight, but can be medium if needed — keeps clean */
      color: #ffffff;             /* white text on black background for readability */
      text-align: center;
      line-height: 1.2;           /* comfortable spacing, no extra vertical shift */
      letter-spacing: normal;
      font-smoothing: antialiased;
      -webkit-font-smoothing: antialiased;
    }

    /* Optional: ensure no unexpected margins on any wrapper */
    .center-stage {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    /* For extra tiny screens, keep text at 48px but ensure it doesn't overflow */
    @media (max-width: 320px) {
      .big-text {
        font-size: 48px;  /* remains 48px even on smallest screens, but if needed wrap-safe */
        word-break: keep-all;
      }
    }
  </style>
</head>
<body>
  <div class="center-stage">
    <div class="big-text">None</div>
  </div>
</body>
</html>
